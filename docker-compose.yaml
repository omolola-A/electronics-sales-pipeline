services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      retries: 5

  mysql:
    image: mysql:8.0
    command: ["--default-authentication-plugin=mysql_native_password"]
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: projectdb   # ✅ keep this
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -proot || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 40s

  airflow-init:
    image: ${AIRFLOW_IMAGE_NAME}
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: /bin/bash
    command:
      - -c
      - >
        pip install --no-cache-dir pandas sqlalchemy pymysql &&
        airflow db init &&
        airflow users create --username admin --password admin123
        --firstname Admin --lastname User --role Admin --email admin@example.com
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      _PIP_ADDITIONAL_REQUIREMENTS: "pandas sqlalchemy pymysql"
    user: "${AIRFLOW_UID:-50000}"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./data:/opt/airflow/data

  webserver:
    image: ${AIRFLOW_IMAGE_NAME}
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      _PIP_ADDITIONAL_REQUIREMENTS: "pandas sqlalchemy pymysql"
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__WEBSERVER__BASE_URL: "http://localhost:8080"   # ✅ correct
    command: webserver
    ports:
      - "8080:8080"
    user: "${AIRFLOW_UID:-50000}"
    volumes: 
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./data:/opt/airflow/data

  scheduler:
    image: ${AIRFLOW_IMAGE_NAME}
    depends_on:
      webserver:
        condition: service_started
      mysql:
        condition: service_healthy
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      _PIP_ADDITIONAL_REQUIREMENTS: "pandas sqlalchemy pymysql"
      AIRFLOW__WEBSERVER__BASE_URL: "http://localhost:8080"   # ✅ ADD THIS
    command: scheduler
    user: "${AIRFLOW_UID:-50000}"
    volumes: 
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./data:/opt/airflow/data

volumes:
  pgdata:
  mysql_data: